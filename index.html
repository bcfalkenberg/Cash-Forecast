<script>

    var val = document.getElementById('pwInput').value;
    if (val === 'ArcherCashFlow') {

      document.getElementById('root').style.display = 'block';
    } else {
      document.getElementById('pwErr').textContent = 'Incorrect password. Please try again.';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  }
  document.getElementById('pwInput').focus();
</script>

function fmt(n, compact) {
  if (n == null || isNaN(n)) return "--";
  var neg = n < 0, abs = Math.abs(n);
  if (compact) {
    if (abs >= 1e6) return (neg?"(":"") + "$" + (abs/1e6).toFixed(1) + "M" + (neg?")":"");
    if (abs >= 1e3) return (neg?"(":"") + "$" + (abs/1e3).toFixed(0) + "K" + (neg?")":"");
    return (neg?"(":"") + "$" + abs.toFixed(0) + (neg?")":"");
  }
  return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n);
}

function compute(scenKey, bkgMult, collShift) {
  var sc = SCENARIOS[scenKey];
  var isBase = (scenKey === "base" && bkgMult === 1.0 && collShift === 0);
  var shiftedBk = [];
  for (var i=0;i<N;i++) { var s=i-collShift; shiftedBk.push((s>=0&&s<N)?BASE_BOOKING_COLLECTIONS[s]*bkgMult:0); }
  var out = [], bal = END_BALANCE_ACTUAL;
  for (var i=0;i<N;i++) {
    var isAct = WEEKS[i].isActual;
    if (isBase) {
      out.push({label:WEEKS[i].label,ending:WEEKS[i].ending,isActual:isAct,
        arCollect:AR_COLLECTIONS[i], bkCollect:BASE_BOOKING_COLLECTIONS[i],
        totalReceipts:TOTAL_OP_RECEIPTS[i], payroll:PAYROLL[i], facility:FACILITY[i], taxes:TAXES[i],
        consulting:CONSULTING[i], software:SOFTWARE[i],
        otherOp:OFFICE_EMP[i]+EXP_REPORTS[i]+BIZ_DEV[i]+ROYALTY[i]+MISC[i],
        nonOpsC:NON_OPS_C[i]+NON_OPS_ONETIME[i], acquisition:ACQUISITION[i],
        interest:INTEREST[i], termLoan:TERM_LOAN[i]+DELAYED_DRAW[i]+LOAN_ADMIN[i],
        totalDisb:TOTAL_OP_DISB[i]+TOTAL_NON_OP[i], netCF:NET_CASH_FLOW[i],
        endBalance:ENDING_BALANCE_BASE[i], baseBalance:ENDING_BALANCE_BASE[i]});
      continue;
    }
    var arC  = isAct ? AR_COLLECTIONS[i] : AR_COLLECTIONS[i]*sc.arMult;
    var bkC  = isAct ? BASE_BOOKING_COLLECTIONS[i] : shiftedBk[i];
    var tot  = arC + bkC;
    var fixD = PAYROLL[i]+FACILITY[i]+TAXES[i]+ACQUISITION[i]+INTEREST[i]+TERM_LOAN[i]+DELAYED_DRAW[i]+LOAN_ADMIN[i];
    var discB= CONSULTING[i]+OFFICE_EMP[i]+EXP_REPORTS[i]+SOFTWARE[i]+BIZ_DEV[i]+ROYALTY[i]+MISC[i]+NON_OPS_C[i]+NON_OPS_ONETIME[i];
    var discD= isAct ? discB : discB*sc.discMult;
    var net  = tot - fixD - discD;
    if (isAct) bal = END_BALANCE_ACTUAL; else bal += net;
    out.push({label:WEEKS[i].label,ending:WEEKS[i].ending,isActual:isAct,
      arCollect:arC, bkCollect:bkC, totalReceipts:tot,
      payroll:PAYROLL[i], facility:FACILITY[i], taxes:TAXES[i],
      consulting:isAct?CONSULTING[i]:CONSULTING[i]*sc.discMult,
      software:isAct?SOFTWARE[i]:SOFTWARE[i]*sc.discMult,
      otherOp:(OFFICE_EMP[i]+EXP_REPORTS[i]+BIZ_DEV[i]+ROYALTY[i]+MISC[i])*(isAct?1:sc.discMult),
      nonOpsC:(NON_OPS_C[i]+NON_OPS_ONETIME[i])*(isAct?1:sc.discMult),
      acquisition:ACQUISITION[i], interest:INTEREST[i],
      termLoan:TERM_LOAN[i]+DELAYED_DRAW[i]+LOAN_ADMIN[i],
      totalDisb:fixD+discD, netCF:net,
      endBalance:isAct?END_BALANCE_ACTUAL:bal, baseBalance:ENDING_BALANCE_BASE[i]});
  }
  return out;
}

function niceAxis(minV, maxV) {
  var range = maxV - minV || 1e6, rough = range/5;
  var mag = Math.pow(10, Math.floor(Math.log10(rough)));
  var nice = [1,2,2.5,5,10].map(function(f){return f*mag;}).filter(function(f){return f>=rough;})[0] || mag*10;
  var lo = Math.floor(minV/nice)*nice, hi = Math.ceil(maxV/nice)*nice;
  var ticks = []; for (var v=lo; v<=hi+nice*0.01; v+=nice) ticks.push(Math.round(v));
  return {min:lo, max:hi, ticks:ticks};
}


function showTip(evt, lines) {
  var tip = document.getElementById('chartTip');
  if (!tip) return;
  var html = lines.map(function(l){ return '<div style="display:flex;justify-content:space-between;gap:20px;padding:1px 0"><span style="color:#8899aa">'+l[0]+'</span><span style="font-weight:700;color:'+l[2]+'">'+l[1]+'</span></div>'; }).join('');
  tip.innerHTML = html;
  tip.style.display = 'block';
  moveTip(evt);
}
function moveTip(evt) {
  var tip = document.getElementById('chartTip');
  if (!tip || tip.style.display === 'none') return;
  var x = evt.clientX + 14, y = evt.clientY - 10;
  if (x + 180 > window.innerWidth) x = evt.clientX - 190;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}
function hideTip() {
  var tip = document.getElementById('chartTip');
  if (tip) tip.style.display = 'none';
}

function areaChart(data, keyFn, keyFn2, color, color2, W, H) {
  W=W||680; H=H||200;
  var L=64,R=8,T=8,B=24,w=W-L-R,h=H-T-B;
  var vals=data.map(keyFn), vals2=keyFn2?data.map(keyFn2):[];
  var all=vals.concat(vals2);
  var ax=niceAxis(Math.min.apply(null,[0].concat(all)), Math.max.apply(null,all));
  var xS=w/(data.length-1);
  var toY=function(v){return T+h*(1-(v-ax.min)/(ax.max-ax.min));};
  var pts=data.map(function(d,i){return (L+i*xS).toFixed(1)+","+toY(keyFn(d)).toFixed(1);}).join(" ");
  var n=data.length-1;
  var fillPts=L+","+toY(keyFn(data[0])).toFixed(1)+" "+pts+" "+(L+n*xS).toFixed(1)+","+toY(keyFn(data[n])).toFixed(1)+" "+(L+n*xS).toFixed(1)+","+(T+h)+" "+L+","+(T+h);
  var uid="g"+Math.random().toString(36).slice(2,6);
  var grid=ax.ticks.map(function(v){var y=toY(v).toFixed(1);return '<line x1="'+L+'" y1="'+y+'" x2="'+(L+w)+'" y2="'+y+'" stroke="#141f2e" stroke-dasharray="3,3"/><text x="'+(L-4)+'" y="'+(parseFloat(y)+4)+'" text-anchor="end" fill="#4a6a8a" font-size="9">'+fmt(v,true)+'</text>';}).join("");
  var xlbls=data.map(function(d,i){return '<text x="'+(L+i*xS).toFixed(1)+'" y="'+(T+h+16)+'" text-anchor="middle" fill="#4a6a8a" font-size="8">'+d.label+'</text>';}).join("");
  var refY=toY(10e6); var refL=(refY>=T&&refY<=T+h)?'<line x1="'+L+'" y1="'+refY.toFixed(1)+'" x2="'+(L+w)+'" y2="'+refY.toFixed(1)+'" stroke="#FF6B6B" stroke-dasharray="4,3" opacity=".6"/><text x="'+(L+w-2)+'" y="'+(refY-3).toFixed(1)+'" text-anchor="end" fill="#FF6B6B" font-size="8">$10M floor</text>':"";
  var b2=""; if(keyFn2){var p2=data.map(function(d,i){return (L+i*xS).toFixed(1)+","+toY(keyFn2(d)).toFixed(1);}).join(" ");b2='<polyline points="'+p2+'" fill="none" stroke="'+color2+'" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>';}
  var dots=data.map(function(d,i){return d.isActual?'<circle cx="'+(L+i*xS).toFixed(1)+'" cy="'+toY(keyFn(d)).toFixed(1)+'" r="4" fill="white" stroke="'+color+'" stroke-width="2"/>':"";}).join("");
  // Hover hit areas + vertical crosshair
  var cid="c"+uid;
  var hitAreas=data.map(function(d,i){
    var x=(L+i*xS).toFixed(1);
    var lines=[['Week ending',d.ending,'#8899aa'],['Balance',fmt(keyFn(d),true),color]];
    if(keyFn2) lines.push(['Base',fmt(keyFn2(d),true),'#5a7a9a']);
    var esc=JSON.stringify(lines).replace(/"/g,"&quot;");
    return '<rect x="'+(parseFloat(x)-xS/2)+'" y="'+T+'" width="'+xS+'" height="'+h+'" fill="transparent" '+
      'onmouseenter="showTip(event,'+esc+')" onmousemove="moveTip(event)" onmouseleave="hideTip()" '+
      'onmouseenter="document.getElementById(\''+cid+'\').setAttribute(\'x1\','+x+');document.getElementById(\''+cid+'\').setAttribute(\'x2\','+x+');document.getElementById(\''+cid+'\').style.display=\'block\';showTip(event,'+esc+')" '+
      'onmouseleave="document.getElementById(\''+cid+'\').style.display=\'none\';hideTip()"/>';
  }).join("");
  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">'+
    '<defs><linearGradient id="'+uid+'" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="5%" stop-color="'+color+'" stop-opacity=".28"/><stop offset="95%" stop-color="'+color+'" stop-opacity=".02"/>'+
    '</linearGradient></defs>'+
    grid+
    '<line x1="'+L+'" y1="'+T+'" x2="'+L+'" y2="'+(T+h)+'" stroke="#1e2d3d"/>'+
    refL+b2+
    '<polygon points="'+fillPts+'" fill="url(#'+uid+')"/>'+
    '<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.5"/>'+
    dots+
    '<line id="'+cid+'" x1="'+L+'" y1="'+T+'" x2="'+L+'" y2="'+(T+h)+'" stroke="'+color+'" stroke-width="1" opacity=".4" style="display:none" pointer-events="none"/>'+
    hitAreas+
    xlbls+'</svg>';
}

function barChart(data, key1, key2, c1, c2, W, H, stacked) {
  W=W||680; H=H||170;
  var L=64,R=8,T=8,B=24,w=W-L-R,h=H-T-B;
  var v1s=data.map(function(d){return d[key1]||0;}), v2s=key2?data.map(function(d){return d[key2]||0;}):[0];
  var combined=stacked?v1s.map(function(v,i){return v+(v2s[i]||0);}):v1s.concat(v2s);
  var ax=niceAxis(Math.min.apply(null,[0].concat(combined)), Math.max.apply(null,combined));
  var bW=Math.min(18,w/data.length*0.5);
  var toY=function(v){return T+h*(1-(v-ax.min)/(ax.max-ax.min));};
  var zY=toY(0);
  var grid=ax.ticks.map(function(v){var y=toY(v).toFixed(1);return '<line x1="'+L+'" y1="'+y+'" x2="'+(L+w)+'" y2="'+y+'" stroke="#141f2e" stroke-dasharray="3,3"/><text x="'+(L-4)+'" y="'+(parseFloat(y)+4)+'" text-anchor="end" fill="#4a6a8a" font-size="9">'+fmt(v,true)+'</text>';}).join("");
  var xlbls=data.map(function(d,i){return '<text x="'+(L+i*w/(data.length-1)).toFixed(1)+'" y="'+(T+h+16)+'" text-anchor="middle" fill="#4a6a8a" font-size="8">'+d.label+'</text>';}).join("");
  var bars=data.map(function(d,i){
    var x=L+i*w/(data.length-1), v1=d[key1]||0, v2=key2?(d[key2]||0):0;
    var lines=[['Week ending',d.ending,'#8899aa']];
    if(key1) lines.push([key1,fmt(v1,true),v1<0?'#FF6B6B':c1]);
    if(key2) lines.push([key2,fmt(v2,true),c2]);
    var esc=JSON.stringify(lines).replace(/"/g,"&quot;");
    var hover='onmouseenter="showTip(event,'+esc+')" onmousemove="moveTip(event)" onmouseleave="hideTip()"';
    if(stacked){
      var yM=toY(v1),yT=toY(v1+v2);
      return '<rect x="'+(x-bW/2).toFixed(1)+'" y="'+yM.toFixed(1)+'" width="'+bW+'" height="'+Math.max(1,zY-yM).toFixed(1)+'" fill="'+c1+'" rx="2" '+hover+'/>'+
        (v2?'<rect x="'+(x-bW/2).toFixed(1)+'" y="'+yT.toFixed(1)+'" width="'+bW+'" height="'+Math.max(1,yM-yT).toFixed(1)+'" fill="'+c2+'" rx="2" '+hover+'/>':'');
    }
    var off=key2?bW*0.55:0, y1=v1>=0?toY(v1):zY, h1=Math.max(1,Math.abs(toY(v1)-zY)), y2=toY(v2), h2=Math.max(1,zY-y2);
    return '<rect x="'+(x-off-bW/2).toFixed(1)+'" y="'+y1.toFixed(1)+'" width="'+bW+'" height="'+h1.toFixed(1)+'" fill="'+(v1<0?"#FF4444":c1)+'" rx="2" '+hover+'/>'+
      (key2?'<rect x="'+(x+off-bW/2).toFixed(1)+'" y="'+y2.toFixed(1)+'" width="'+bW+'" height="'+h2.toFixed(1)+'" fill="'+c2+'" rx="2" '+hover+'/>':'');
  }).join("");
  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">'+
    grid+
    '<line x1="'+L+'" y1="'+zY.toFixed(1)+'" x2="'+(L+w)+'" y2="'+zY.toFixed(1)+'" stroke="#2a3a4a"/>'+
    bars+xlbls+'</svg>';
}

function h(tag, attrs, content) {
  var a = Object.keys(attrs||{}).map(function(k){return ' '+k+'="'+attrs[k]+'"';}).join("");
  return "<"+tag+a+">"+(content||"")+"</"+tag+">";
}


function boardLiquidityChart(data, W, H) {
  W=W||660; H=H||220;
  var L=64,R=8,T=8,B=24,w=W-L-R,h=H-T-B;
  var allVals = data.map(function(d){return d.liquidity;});
  var ax = niceAxis(0, Math.max.apply(null,allVals)*1.08);
  var xS = w/(data.length-1);
  var toY = function(v){return T+h*(1-(v-ax.min)/(ax.max-ax.min));};
  // Stacked area: cash bottom, revolver avail on top
  var cashPts = data.map(function(d,i){return (L+i*xS).toFixed(1)+","+toY(d.cash).toFixed(1);}).join(" ");
  var liqPts  = data.map(function(d,i){return (L+i*xS).toFixed(1)+","+toY(d.liquidity).toFixed(1);}).join(" ");
  var n = data.length-1;
  var cashFill = L+","+toY(data[0].cash)+" "+cashPts+" "+(L+n*xS)+","+toY(data[n].cash)+" "+(L+n*xS)+","+(T+h)+" "+L+","+(T+h);
  var liqFill  = L+","+toY(data[0].liquidity)+" "+liqPts+" "+(L+n*xS)+","+toY(data[n].liquidity)+" "+cashPts.split(" ").reverse().join(" ");
  var uid1="lg1"+Math.random().toString(36).slice(2,5);
  var uid2="lg2"+Math.random().toString(36).slice(2,5);
  var grid=ax.ticks.map(function(v){var y=toY(v).toFixed(1);return '<line x1="'+L+'" y1="'+y+'" x2="'+(L+w)+'" y2="'+y+'" stroke="#141f2e" stroke-dasharray="3,3"/><text x="'+(L-4)+'" y="'+(parseFloat(y)+4)+'" text-anchor="end" fill="#4a6a8a" font-size="9">'+fmt(v,true)+'</text>';}).join("");
  var xlbls=data.map(function(d,i){return '<text x="'+(L+i*xS).toFixed(1)+'" y="'+(T+h+16)+'" text-anchor="middle" fill="#4a6a8a" font-size="8">'+d.label+'</text>';}).join("");
  var hitAreas=data.map(function(d,i){
    var x=(L+i*xS).toFixed(1);
    var lines=[["Week ending",d.ending,"#8899aa"],["Cash",fmt(d.cash,true),"#4ECDC4"],["Revolver Avail",fmt(d.revolverAvail,true),"#45B7D1"],["Total Liquidity",fmt(d.liquidity,true),"#a78bfa"]];
    var esc=JSON.stringify(lines).replace(/"/g,"&quot;");
    return '<rect x="'+(parseFloat(x)-xS/2)+'" y="'+T+'" width="'+xS+'" height="'+h+'" fill="transparent" onmouseenter="showTip(event,'+esc+')" onmousemove="moveTip(event)" onmouseleave="hideTip()"/>';
  }).join("");
  var dots=data.map(function(d,i){return d.isActual?'<circle cx="'+(L+i*xS).toFixed(1)+'" cy="'+toY(d.liquidity).toFixed(1)+'" r="4" fill="white" stroke="#a78bfa" stroke-width="2"/>':"";}).join("");
  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">'+
    '<defs>'+
    '<linearGradient id="'+uid1+'" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stop-color="#4ECDC4" stop-opacity=".35"/><stop offset="95%" stop-color="#4ECDC4" stop-opacity=".05"/></linearGradient>'+
    '<linearGradient id="'+uid2+'" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stop-color="#45B7D1" stop-opacity=".25"/><stop offset="95%" stop-color="#45B7D1" stop-opacity=".02"/></linearGradient>'+
    '</defs>'+
    grid+
    '<line x1="'+L+'" y1="'+T+'" x2="'+L+'" y2="'+(T+h)+'" stroke="#1e2d3d"/>'+
    '<polygon points="'+cashFill+'" fill="url(#'+uid1+')"/>'+
    '<polygon points="'+liqFill+'" fill="url(#'+uid2+')"/>'+
    '<polyline points="'+cashPts+'" fill="none" stroke="#4ECDC4" stroke-width="2"/>'+
    '<polyline points="'+liqPts+'"  fill="none" stroke="#a78bfa" stroke-width="2.5"/>'+
    dots+hitAreas+xlbls+
    '<text x="'+(L+10)+'" y="'+(T+16)+'" fill="#4ECDC4" font-size="9" opacity=".8">Cash</text>'+
    '<text x="'+(L+50)+'" y="'+(T+16)+'" fill="#a78bfa" font-size="9" opacity=".8">Total Liquidity</text>'+
    '</svg>';
}

function boardRevolverChart(data, W, H) {
  W=W||660; H=H||180;
  var L=64,R=8,T=8,B=24,w=W-L-R,h=H-T-B;
  var ax = niceAxis(0, 100000000);
  var bW = Math.min(28, w/data.length*0.55);
  var toY = function(v){return T+h*(1-(v-ax.min)/(ax.max-ax.min));};
  var zY = toY(0);
  var grid=ax.ticks.map(function(v){var y=toY(v).toFixed(1);return '<line x1="'+L+'" y1="'+y+'" x2="'+(L+w)+'" y2="'+y+'" stroke="#141f2e" stroke-dasharray="3,3"/><text x="'+(L-4)+'" y="'+(parseFloat(y)+4)+'" text-anchor="end" fill="#4a6a8a" font-size="9">'+fmt(v,true)+'</text>';}).join("");
  var xlbls=data.map(function(d,i){return '<text x="'+(L+i*w/(data.length-1)).toFixed(1)+'" y="'+(T+h+16)+'" text-anchor="middle" fill="#4a6a8a" font-size="8">'+d.label+'</text>';}).join("");
  var bars=data.map(function(d,i){
    var x=L+i*w/(data.length-1);
    var yAvail=toY(d.revolverAvail), hAvail=Math.max(1,zY-yAvail);
    var yUsed=toY(d.revolverUsed||0), hUsed=Math.max(0,zY-yUsed);
    var lines=[["Week ending",d.ending,"#8899aa"],["Drawn",fmt(d.revolverUsed||0,true),"#FF6B6B"],["Available",fmt(d.revolverAvail,true),"#45B7D1"]];
    var esc=JSON.stringify(lines).replace(/"/g,"&quot;");
    var hover='onmouseenter="showTip(event,'+esc+')" onmousemove="moveTip(event)" onmouseleave="hideTip()"';
    return '<rect x="'+(x-bW/2).toFixed(1)+'" y="'+yAvail.toFixed(1)+'" width="'+bW+'" height="'+hAvail.toFixed(1)+'" fill="#45B7D1" opacity=".35" rx="2" '+hover+'/>'+
           (hUsed>0?'<rect x="'+(x-bW/2).toFixed(1)+'" y="'+yUsed.toFixed(1)+'" width="'+bW+'" height="'+hUsed.toFixed(1)+'" fill="#FF6B6B" rx="2" '+hover+'/>':'');
  }).join("");
  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">'+
    grid+'<line x1="'+L+'" y1="'+zY.toFixed(1)+'" x2="'+(L+w)+'" y2="'+zY.toFixed(1)+'" stroke="#2a3a4a"/>'+
    bars+xlbls+
    '<text x="'+(L+10)+'" y="'+(T+16)+'" fill="#45B7D1" font-size="9" opacity=".8">Available</text>'+
    '<text x="'+(L+68)+'" y="'+(T+16)+'" fill="#FF6B6B" font-size="9" opacity=".8">Drawn</text>'+
    '</svg>';
}

          '<thead><tr>'+
            '<th style="text-align:left;color:#3a5a7a">METRIC</th>'+
            BOARD_WEEKS.map(function(w){return '<th style="text-align:right;color:'+(w.isActual?"#7ec8e3":"#3a5a7a")+'">'+w.label+(w.isActual?"*":"")+'</th>';}).join("")+
          '</tr></thead>'+
          '<tbody>'+
            '<tr><td style="color:#4ECDC4;text-align:left">Cash Balance</td>'+BOARD_CASH.map(function(v,i){return '<td style="text-align:right;color:'+(BOARD_WEEKS[i].isActual?"#7ec8e3":"#4ECDC4")+'" class="mono">'+fmt(v,true)+'</td>';}).join("")+'</tr>'+
            '<tr><td style="color:#45B7D1;text-align:left">Revolver Drawn</td>'+BOARD_REVOLVER.map(function(v){return '<td style="text-align:right;color:#FF6B6B" class="mono">'+(v>0?"("+fmt(v,true)+")":"--")+'</td>';}).join("")+'</tr>'+
            '<tr><td style="color:#45B7D1;text-align:left">Revolver Available</td>'+BOARD_REV_AVAIL.map(function(v){return '<td style="text-align:right;color:#45B7D1" class="mono">'+fmt(v,true)+'</td>';}).join("")+'</tr>'+
            '<tr style="border-top:1px solid #1a2a3a"><td style="color:#a78bfa;font-weight:700;text-align:left">Total Liquidity</td>'+BOARD_LIQUIDITY.map(function(v){return '<td style="text-align:right;color:#a78bfa;font-weight:700" class="mono">'+fmt(v,true)+'</td>';}).join("")+'</tr>'+
          '</tbody>'+
        '</table>'+
        '<div style="font-size:9px;color:#2a4a6a;margin-top:8px">* Actual week. Revolver capacity = $80M.</div>'+
      '</div>';
  }

  // ── KPIs
  var kpiColor = function(v){return v>15e6?"#4ECDC4":v>8e6?"#f0c040":"#FF6B6B";};
  var kpis = [
    {label:"Ending Balance (Wk 18)", val:finalBal,      color:kpiColor(finalBal)},
    {label:"Minimum Balance",         val:minBal,        color:kpiColor(minBal), sub:"Week of "+(minBalWk?minBalWk.label:"")},
    {label:"Net Cash Flow (18W)",     val:totalNetCF,    color:totalNetCF>=0?"#4ECDC4":"#FF6B6B"},
    {label:"Total Receipts (18W)",    val:totalReceipts, color:"#c8d8e8"}
  ];

  // ── SCENARIO BUTTONS
  var scenBtns = Object.keys(SCENARIOS).map(function(key){
    var s = SCENARIOS[key];
    var active = state.scenario === key;
    var bdr = active ? s.color : "#1e2d3d";
    var bg  = active ? s.color + "14" : "transparent";
    var clr = active ? s.color : "#5a7a9a";
    var fw  = active ? 700 : 400;
    return "<button data-action=\"scenario\" data-val=\"" + key + "\" style=\"display:block;width:100%;text-align:left;padding:8px 10px;margin-bottom:5px;border-radius:7px;border:1px solid " + bdr + ";background:" + bg + ";color:" + clr + ";font-size:12px;font-weight:" + fw + "\">" +
      "<div style=\"font-weight:700\">" + s.label + "</div><div style=\"font-size:10px;opacity:.7;margin-top:1px\">" + s.desc + "</div></button>";
  }).join("");

  // ── VIEW TABS
  var tabs = [["chart","Charts"],["table","Detail Table"],["bridge","Weekly Bridge"],["board","Board View"]].map(function(v){
    var active = state.view === v[0];
    var bg  = active ? "#1e2d3d" : "transparent";
    var clr = active ? "#c8d8e8" : "#5a7a9a";
    var fw  = active ? 600 : 400;
    return "<button data-action=\"view\" data-val=\"" + v[0] + "\" style=\"padding:6px 14px;border-radius:6px;border:none;background:" + bg + ";color:" + clr + ";font-size:12px;font-weight:" + fw + "\">" + v[1] + "</button>";
  }).join("");

  document.getElementById("root").innerHTML =
    // HEADER
    '<div style="background:#0a1520;border-bottom:1px solid #1a2a3a;padding:13px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100">' +
      '<div style="display:flex;align-items:center;gap:12px">' +
        '<div style="width:32px;height:32px;background:linear-gradient(135deg,#4ECDC4,#45B7D1);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#0a1520">A</div>' +
        '<div><div style="font-size:16px;font-weight:800;color:#e8f4f8;letter-spacing:-0.3px">Archer Buyer, Inc - Cash Flow Forecaster</div>' +
        '<div style="font-size:9px;color:#3a5a7a;letter-spacing:.1em;text-transform:uppercase;margin-top:1px">18-Week Consolidated - USD - As of '+MODEL_AS_OF+' - Model '+MODEL_VER+'</div></div>' +
      '</div>' +
      '<div style="display:flex;gap:8px;align-items:center">' +
        '<span style="background:'+sc.color+'1a;color:'+sc.color+';border:1px solid '+sc.color+'44;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700">'+sc.label+'</span>' +
        (state.bkgMult!==1.0||state.collShift!==0?'<span style="background:#a78bfa1a;color:#a78bfa;border:1px solid #a78bfa44;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700">Bookings: '+bkgLabel+' / '+shiftLabel+'</span>':"") +
      '</div>' +
    '</div>' +
    // BODY
    '<div style="display:flex;align-items:flex-start">' +
      // LEFT PANEL
      '<div style="width:265px;min-width:265px;background:#090f19;border-right:1px solid #1a2a3a;padding:16px 14px;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto">' +
        '<div style="margin-bottom:18px"><div style="font-size:10px;color:#3a5a7a;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:8px">Scenario</div>'+scenBtns+'</div>' +
        '<div style="border-top:1px solid #1a2a3a;padding-top:16px;margin-bottom:16px">' +
          '<div style="font-size:10px;color:#a78bfa;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:3px">Bookings Sensitivity</div>' +
          '<div style="font-size:10px;color:#3a5a7a;margin-bottom:14px">Adjust volume and timing of new booking cash receipts</div>' +
          '<div style="margin-bottom:16px">' +
            '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:11px;color:#8899aa;text-transform:uppercase;letter-spacing:.08em">Bookings Volume</span><span style="font-size:13px;font-weight:700;color:#a78bfa" class="mono">'+(state.bkgMult===1.0?"100% (Plan)":(state.bkgMult*100).toFixed(0)+"% of Plan")+'</span></div>' +
            '<input id="sliderBkg" type="range" min="0.3" max="2.0" step="0.05" value="'+state.bkgMult+'" style="accent-color:#a78bfa"/>' +
            '<div style="font-size:10px;color:#3a5a7a;margin-top:3px">Scales new booking cash vs. FP&amp;A plan</div>' +
          '</div>' +
          '<div style="margin-bottom:14px">' +
            '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:11px;color:#8899aa;text-transform:uppercase;letter-spacing:.08em">Bookings Timing</span><span style="font-size:13px;font-weight:700;color:#f0c040" class="mono">'+shiftLabel+'</span></div>' +
            '<input id="sliderShift" type="range" min="-2" max="6" step="1" value="'+state.collShift+'" style="accent-color:#f0c040"/>' +
            '<div style="font-size:10px;color:#3a5a7a;margin-top:3px">Bookings only - shifts when new booking cash arrives. AR aging unaffected.</div>' +
          '</div>' +
          '<div style="background:#1a2a3a;border-radius:8px;padding:11px 12px">' +
            '<div style="font-size:10px;color:#5a7a9a;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em">Bookings Cash Impact (18W)</div>' +
            '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:#5a7a9a">Plan cash receipts</span><span style="font-size:11px;color:#c8d8e8" class="mono">'+fmt(planBkgTotal,true)+'</span></div>' +
            '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:#5a7a9a">Scenario receipts</span><span style="font-size:11px;color:#a78bfa" class="mono">'+fmt(totalBkgCash,true)+'</span></div>' +
            '<div style="display:flex;justify-content:space-between;border-top:1px solid #243447;padding-top:5px;margin-top:2px"><span style="font-size:11px;color:#5a7a9a;font-weight:700">Delta</span><span style="font-size:12px;color:'+(totalBkgCash>=planBkgTotal?"#4ECDC4":"#FF6B6B")+';font-weight:700" class="mono">'+fmt(totalBkgCash-planBkgTotal,true)+'</span></div>' +
          '</div>' +
        '</div>' +
        '<div style="border-top:1px solid #1a2a3a;padding-top:16px">' +
          '<div style="font-size:10px;color:#3a5a7a;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:10px">Key Metrics</div>' +
          kpis.map(function(k){return '<div style="margin-bottom:9px;background:#0d1b2a;border-radius:8px;padding:10px 12px;border-left:2px solid '+k.color+'"><div style="font-size:10px;color:#5a7a9a;margin-bottom:2px">'+k.label+'</div><div style="font-size:17px;font-weight:800;color:'+k.color+';letter-spacing:-.5px" class="mono">'+fmt(k.val,true)+'</div>'+(k.sub?'<div style="font-size:10px;color:#3a5a7a;margin-top:1px">'+k.sub+'</div>':"")+'</div>';}).join("") +
        '</div>' +
      '</div>' +
      // RIGHT PANEL
      '<div style="flex:1;padding:16px 20px;min-width:0">' +
        '<div style="display:flex;gap:4px;margin-bottom:14px">'+tabs+'</div>' +
        mainContent +
      '</div>' +
    '</div>';
}

render();
</script>

<div id="chartTip" style="display:none;position:fixed;background:#0b1622;border:1px solid #1e2d3d;border-radius:8px;padding:10px 14px;font-family:'DM Mono',monospace;font-size:11px;color:#c8d8e8;pointer-events:none;z-index:9999;min-width:160px;box-shadow:0 4px 20px rgba(0,0,0,.5)"></div>
</body>
</html>
